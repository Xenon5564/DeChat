<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>P2P-Chat</title>
    </head>

    <body>
        <div id="container">
            <h1>DeChat</h1>

            <div id="loginPage">
                <label>Enter your username:</label>
                <input type="text" id="usernameInput" name="username" autocomplete="on">
                <button id="loginButton">Connect</button>
            </div>
            
            <div id="chatPage" style="display: none;">
                <div id="chatBody">
                    <div id="roomListContainer">
                        <h3>Rooms:</h3>
                        <button id="globalChatButton" class="room-btn active">Global Chat</button>
                        
                        <h4>Private Chats:</h4>
                        <ul id="dmList"> 
                            <li></li>
                        </ul>
                    </div>
                    <div id="messageContainer">
                        <div id="messageList"></div>
                    </div>
                    
                    <div id="userListContainer">
                        <h3>Online Users:</h3>
                        <ul id="userList"></ul>
                    </div>
                </div>

                <div id="inputContainer">
                    <label>Enter your message:</label>
                    <input type="text" id="content" name="message">
                    <label for="attachment" id="attachmentButton">🖼️</label>
                    <input type="file" id="attachment" accept="image/*">
                    <button id="send">Send</button>
                    <button id="disconnectButton">Disconnect</button>
                </div>
            </div>
            
            
        </div>

        <div id="dmNotif" style="display: none;">
            <h3>DM Request</h3>
            <p id="dmRequestText"></p>
            <div class="button-row">
                <button id="acceptDm">Accept</button>
                <button id="declineDm">Decline</button>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="identity.js"></script>
        <script src="app.js"></script>

    </body>
</html>
